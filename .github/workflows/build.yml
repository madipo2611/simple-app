name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
        pip install ruff 
    - name: Lint Python code with Ruff
      run: ruff check app/

    - name: Install shellcheck
      run: sudo apt-get update && sudo apt-get install -y shellcheck

    - name: Lint Bash scripts with shellcheck
      run: shellcheck scripts/*.sh

    - name: Run tests with pytest
      run: pytest app/tests/ -v

    - name: Build Docker image
      run: docker build -t simple-app:${{ github.sha }} .

    - name: Run Docker container
      run: docker run -d --name test-container -p 5000:5000 simple-app:${{ github.sha }}

    - name: Test container health
      run: |
        sleep 5 
        curl --fail --retry 5 --retry-delay 2 --retry-connrefused http://localhost:5000/health
