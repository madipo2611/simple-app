# docker-compose.yml
version: '3.8'

services:
  app:
    build: .
    image: simple-app:latest
    container_name: simple-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      # Можно добавить другие переменные, например:
      # - DATABASE_URL=postgresql://...
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    # Для разработки можно расскомментировать volume для горячей перезагрузки
    # volumes:
    #   - ./app:/app/app
    restart: unless-stopped
